name: Release

# Push a tag like `v0.1.0-beta.1` to cut a release: the version is derived from the tag, all
# packable src projects are packed, pushed to NuGet.org via Trusted Publishing (OIDC), and a
# GitHub Release is created with the .nupkg/.snupkg attached.
on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Pack + push to NuGet.org
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create the GitHub Release
      id-token: write        # OIDC token for NuGet.org Trusted Publishing
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Tag `v0.1.0-beta.1` -> version `0.1.0-beta.1`. A `-` marks a prerelease.
      - name: Derive version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Releasing $VERSION"

      - name: Build
        run: dotnet build CloudSql.Connector.slnx -c Release -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test CloudSql.Connector.slnx -c Release --no-build

      # Solution pack emits only IsPackable=true projects (the shipped src libraries).
      # IncludeSymbols/snupkg are configured in Directory.Build.props.
      - name: Pack
        run: dotnet pack CloudSql.Connector.slnx -c Release --no-build -p:Version=${{ steps.version.outputs.version }} -o artifacts

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived (1h) NuGet.org API
      # key. No long-lived secret to store. NUGET_USER is your nuget.org profile name (not email);
      # set it as a repo secret. Requires a matching trusted publishing policy on nuget.org
      # (owner=marklonquist, repo=cloud-sql-proxy-dotnet, workflow=release.yml).
      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      # Pushing the .nupkg also pushes the adjacent .snupkg symbol package.
      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          --title "${GITHUB_REF_NAME}"
          --generate-notes
          ${{ steps.version.outputs.prerelease == 'true' && '--prerelease' || '' }}
          artifacts/*.nupkg artifacts/*.snupkg
